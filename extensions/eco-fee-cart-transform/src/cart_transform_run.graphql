query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            title
            ecoCategoryTags: hasTags(
              tags: [
                "eco-category-computers"
                "eco-category-laptops"
                "eco-category-printers"
                "eco-category-peripherals"
                "eco-category-av"
                "eco-category-cellphones"
                "eco-category-display-small"
                "eco-category-display-large"
                "eco-category-display-xlarge"
                "eco-category-all-in-one"
                "eco-category-monitor-small"
                "eco-category-monitor-large"
                "eco-category-monitor-xlarge"
                "eco-category-small-appliances"
                "eco-category-tools"
              ]
            ) {
              tag
              hasTag
            }
          }
        }
      }
    }
  }

  shop {
    jurisdiction: metafield(namespace: "synorai_ecocharge", key: "jurisdiction") {
      value
    }
    effectiveMode: metafield(namespace: "synorai_ecocharge", key: "effective_mode") {
      value
    }
  }
}